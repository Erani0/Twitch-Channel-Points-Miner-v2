      git clone https://github.com/Erani0/Twitch-Channel-Points-Miner-v2.git .tmp_miner

      echo "Verschiebe Dateien..."
      cp -r .tmp_miner/* ./
      cp -r .tmp_miner/.[!.]* ./ 2>/dev/null || true
      rm -rf .tmp_miner

      echo "Erstelle deine konfigurierte run.py..."
